<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザーポータル v10.0</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: #333; }
        #auth-container, #profile-view, #app-container { display: none; max-width: 500px; margin: 30px auto; background: #fff; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        #app-container { max-width: 100%; margin: 0; border-radius: 0; min-height: 100vh; display: none; flex-direction: column; }
        .hidden { display: none !important; }
        .tab-menu { display: flex; background: #eee; }
        .tab-menu div { flex: 1; text-align: center; padding: 15px 0; cursor: pointer; font-weight: bold; color: #888; }
        .tab-menu div.active { background: #fff; color: #2196F3; border-bottom: 3px solid #2196F3; }
        .form-area { padding: 30px; position: relative; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #666; font-weight: bold; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .action-btn { width: 100%; padding: 12px; background: #2196F3; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        header { background: #2c3e50; color: #fff; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .hamburger-btn { font-size: 24px; cursor: pointer; }
        #sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: #fff; box-shadow: 2px 0 10px rgba(0,0,0,0.2); transition: 0.3s ease; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #sidebar.open { left: 0; }
        .sidebar-close { text-align: right; font-size: 24px; cursor: pointer; color: #999; margin-bottom: 10px; }
        .nav-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: bold; font-size: 14px; }
        .user-icon { width: 80px; height: 80px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 10px; overflow: hidden; border: 2px solid #2196F3; position: relative; }
        .user-icon img { width: 100%; height: 100%; object-fit: cover; }
        .user-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 15px; }
        .user-card { background: #fff; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .rank-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; background: #fff; }
        .rank-num { font-size: 22px; font-weight: bold; color: #FF9800; width: 45px; text-align: center; flex-shrink: 0; }
        .rank-info { flex-grow: 1; padding-left: 10px; text-align: left; }
        .banned-msg { color: #f44336; font-weight: bold; background: #ffebee; padding: 25px 15px; border-radius: 8px; margin: 20px 0; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 15px; }
        #admin-link { position: absolute; top: 10px; right: 10px; color: #e74c3c; font-size: 12px; cursor: pointer; font-weight: bold; border: 1px solid #e74c3c; padding: 4px 8px; border-radius: 4px; display: none; z-index: 1001; background: white; }
        #btn-follow { width: auto; padding: 6px 20px; border-radius: 20px; font-size: 14px; margin-bottom: 15px; display: none; transition: 0.2s; }

        .tweet-card { display: flex; padding: 15px; border-bottom: 1px solid #eee; background: #fff; cursor: pointer; transition: 0.2s; text-align: left; }
        .tweet-card:hover { background: #f9f9f9; }
        .tweet-card .user-icon { width: 48px; height: 48px; font-size: 24px; margin: 0; flex-shrink: 0; }
        .tweet-content { margin-left: 12px; flex-grow: 1; font-size: 15px; line-height: 1.4; }
        .tweet-user { font-weight: bold; font-size: 14px; }
        .tweet-time { font-weight: normal; color: #888; font-size: 11px; margin-left: 5px; }
        .tweet-text { margin-top: 5px; white-space: pre-wrap; word-break: break-all; }
        .post-area { padding: 15px; border-bottom: 8px solid #eee; }
        #post-input { width: 100%; border: none; outline: none; font-size: 18px; resize: none; margin-bottom: 10px; }
        .tweet-actions { display: flex; gap: 20px; margin-top: 10px; color: #666; font-size: 13px; }
        .tweet-actions span { cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .tweet-actions span:hover { color: #2196F3; }
        .liked { color: #e0245e !important; }
        .reposted { color: #17bf63 !important; }
        .repost-label { font-size: 12px; color: #888; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <div id="profile-view" style="max-width: 600px; overflow-y: auto; height: 100vh; position: fixed; top: 0; left: 50%; transform: translateX(-50%); z-index: 2000;">
        <div class="form-area" style="text-align:center; padding-bottom: 0;">
            <div id="admin-link">管理</div>
            <div id="view-normal-content">
                <div class="user-icon" id="view-icon">👤</div>
                <h2 id="view-name">ユーザー名</h2>
                <button id="btn-follow" class="action-btn"></button>
                <div id="view-bio" style="background:#f0f4f8; padding:15px; border-radius:10px; text-align:left; font-size:14px; margin:15px 0; min-height:40px;"></div>
                <div class="stats">
                    <div>💰 <b id="view-score">0</b><br><small style="color:#888;">ポイント</small></div>
                    <div>👥 <b id="view-followers">0</b><br><small style="color:#888;">フォロワー</small></div>
                </div>
                <div style="display: flex; justify-content: center; gap: 5px; margin-bottom: 15px;">
                    <input type="number" id="tip-amount" placeholder="数" style="width: 70px; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                    <button id="btn-tip" class="action-btn" style="background:#FF9800; width: auto; padding: 10px 20px;">pt 送る</button>
                </div>
            </div>
            <div id="view-banned-content" class="banned-msg" style="display:none;">
                <div style="font-size: 1.2em; margin-bottom: 10px;" id="banned-user-name"></div>
                この人はアクセス禁止されています
            </div>
            <a href="javascript:void(0)" style="display:block; color:#2196F3; margin-bottom: 20px;" onclick="closeProfile()">閉じる</a>
        </div>
        <hr style="border:0; border-top:8px solid #eee; margin:0;">
        <div id="profile-posts-area"></div>
    </div>

    <div id="auth-container">
        <div class="tab-menu">
            <div id="tab-login" class="active" onclick="switchTab('login')">ログイン</div>
            <div id="tab-register" onclick="switchTab('register')">新規作成</div>
        </div>
        <div id="form-login" class="form-area">
            <div class="input-group"><label>ユーザー名</label><input type="text" id="login-username"></div>
            <div class="input-group"><label>パスワード</label><input type="password" id="login-password"></div>
            <button class="action-btn" id="btn-do-login">ログイン</button>
        </div>
        <div id="form-register" class="form-area hidden">
            <div class="input-group"><label>ユーザー名</label><input type="text" id="reg-username"></div>
            <div class="input-group"><label>パスワード</label><input type="password" id="reg-password"></div>
            <button class="action-btn" id="btn-do-register" style="background:#34495e;">登録完了</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <div class="hamburger-btn" onclick="toggleSidebar()">☰</div>
            <div id="page-title">ホーム</div>
            <div style="width:24px;"></div>
        </header>

        <nav id="sidebar">
            <div class="sidebar-close" onclick="toggleSidebar()">×</div>
            <div class="user-icon" id="side-icon" style="border:none;">👤</div>
            <div id="disp-name" style="text-align:center; font-weight:bold; margin-bottom:20px;"></div>
            <div class="nav-item" onclick="showSection('home')">🏠 ホーム</div>
            <div class="nav-item" onclick="showSection('tl')">📱 TL（ツイート）</div>
            <div class="nav-item" onclick="window.open('https://soulkin19.github.io/soulch/', '_blank')">💬 掲示板へ行く</div>
            <div class="nav-item" onclick="showSection('members')">👥 ユーザー一覧</div>
            <div class="nav-item" onclick="showSection('ranking')">🏆 ランキング</div>
            <div class="nav-item" onclick="showSection('settings')">⚙️ プロフ設定</div>
            <button id="btn-logout" style="width:100%; padding:10px; background:#eee; border:none; border-radius:5px; margin-top:30px;">ログアウト</button>
        </nav>

        <main id="section-home" class="form-area" style="text-align:center;">
            <h1>おかえりなさい！</h1>
            <button class="action-btn" onclick="showSection('tl')" style="background:#1DA1F2; margin-bottom:20px;">📱 タイムラインを見る</button>
            <div class="stats"><div>所持ポイント<br><b id="home-score" style="font-size:24px;">0</b></div></div>
            <p style="font-size:11px; color:#999; margin-top:20px;">あなたのURL:<br><code id="share-url"></code></p>
        </main>

        <main id="section-tl" class="hidden">
            <div class="post-area">
                <textarea id="post-input" placeholder="いまどうしてる？" rows="3"></textarea>
                <div style="text-align:right;">
                    <button class="action-btn" onclick="submitPost()" style="width:auto; padding:8px 25px; border-radius:20px; background:#1DA1F2;">ポスト</button>
                </div>
            </div>
            <div class="tab-menu">
                <div id="tab-tl-all" class="active" onclick="toggleTL('all')">すべて</div>
                <div id="tab-tl-follow" onclick="toggleTL('follow')">フォロー中</div>
            </div>
            <div id="tl-area"></div>
        </main>

        <main id="section-members" class="hidden">
            <div style="padding:15px;">
                <input type="text" id="user-search" placeholder="ユーザー名を検索..." style="width:100%; padding:12px; border-radius:25px; border:1px solid #ddd; outline:none; box-sizing:border-box; font-size:16px;">
            </div>
            <div id="user-list-area" class="user-list"></div>
        </main>

        <main id="section-ranking" class="hidden">
            <div class="tab-menu">
                <div id="tab-rank-score" class="active" onclick="toggleRank('score')">ポイント</div>
                <div id="tab-rank-follow" onclick="toggleRank('follow')">フォロワー</div>
            </div>
            <div id="rank-list-area"></div>
        </main>

        <main id="section-settings" class="hidden form-area">
            <h3>プロフ設定</h3>
            <div class="user-icon" id="settings-icon-disp" onclick="changeIcon()" style="cursor:pointer;">👤</div>
            <div class="input-group"><label>自己紹介</label><textarea id="settings-bio-input" rows="4"></textarea></div>
            <button class="action-btn" onclick="saveBio()">保存</button>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, update, increment, push, remove, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCwhHspaG94goiCIjVj3h-Un5pBK3JTjMU",
            authDomain: "soulkin-aa3b7.firebaseapp.com",
            databaseURL: "https://soulkin-aa3b7-default-rtdb.firebaseio.com",
            projectId: "soulkin-aa3b7",
            storageBucket: "soulkin-aa3b7.firebasestorage.app",
            messagingSenderId: "358331064206",
            appId: "1:358331064206:web:d7760ea0919259418a4edf"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const me = localStorage.getItem("loginnow");
        let allUsersData = {};
        let currentTLMode = "all";
        let lastSection = "home";

        const isBlacklisted = async (userId) => {
            if(!userId) return false;
            const snap = await get(child(ref(db), `blacklist/${userId}`));
            return snap.exists();
        };

        window.showSection = (name) => {
            ['home', 'tl', 'members', 'ranking', 'settings'].forEach(s => {
                const el = document.getElementById(`section-${s}`);
                if(el) el.classList.toggle('hidden', s !== name);
            });
            document.getElementById('page-title').innerText = name === 'tl' ? 'タイムライン' : name.toUpperCase();
            document.getElementById('sidebar').classList.remove('open');
            lastSection = name;
            if(name === 'members') loadUserList();
            if(name === 'ranking') toggleRank('score');
            if(name === 'tl') toggleTL(currentTLMode);
        };

        window.openProfile = (name) => {
            window.location.hash = name;
            renderProfile(name);
        };

        window.closeProfile = () => {
            window.location.hash = "";
            document.getElementById('profile-view').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            showSection(lastSection);
        };

        // ポスト投稿
        window.submitPost = async () => {
            const txt = document.getElementById('post-input').value.trim();
            if(!txt) return;
            if(await isBlacklisted(me)) return alert("凍結されています");
            const postData = { user: me, text: txt, timestamp: serverTimestamp(), likes: {}, reposts: {} };
            await push(ref(db, 'posts'), postData);
            document.getElementById('post-input').value = "";
            toggleTL(currentTLMode);
        };

        // いいね
        window.likePost = async (postId) => {
            if(!me) return;
            const likeRef = ref(db, `posts/${postId}/likes/${me}`);
            const snap = await get(likeRef);
            if(snap.exists()) await remove(likeRef);
            else await set(likeRef, true);
            updateView();
        };

        // リポスト
        window.repostPost = async (postId) => {
            if(!me) return;
            const repostRef = ref(db, `posts/${postId}/reposts/${me}`);
            const snap = await get(repostRef);
            if(snap.exists()) await remove(repostRef);
            else await set(repostRef, true);
            updateView();
        };

        const updateView = () => {
            if(document.getElementById('profile-view').style.display === 'block') {
                renderProfile(decodeURIComponent(window.location.hash.substring(1)));
            }
            toggleTL(currentTLMode);
        };

        window.replyTo = (user) => {
            showSection('tl');
            document.getElementById('post-input').value = `@${user} `;
            document.getElementById('post-input').focus();
        };

        // タイムライン描画コア
        const renderTweetHTML = (postId, p, isRepostedBy = null) => {
            const time = p.timestamp ? new Date(p.timestamp).toLocaleString([], {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}) : "";
            const likesCount = p.likes ? Object.keys(p.likes).length : 0;
            const repostsCount = p.reposts ? Object.keys(p.reposts).length : 0;
            const isLiked = p.likes && p.likes[me] ? "liked" : "";
            const isReposted = p.reposts && p.reposts[me] ? "reposted" : "";
            const userIcon = (allUsersData[p.user] && allUsersData[p.user].icon) ? `<img src="${allUsersData[p.user].icon}">` : '👤';

            return `
                <div class="tweet-card">
                    <div class="tweet-content">
                        ${isRepostedBy ? `<div class="repost-label">🔄 ${isRepostedBy} がリポスト</div>` : ''}
                        <div style="display:flex;">
                            <div class="user-icon" onclick="event.stopPropagation(); openProfile('${p.user}')">${userIcon}</div>
                            <div style="margin-left:12px; flex-grow:1;" onclick="openProfile('${p.user}')">
                                <div class="tweet-user">${p.user} <span class="tweet-time">${time}</span></div>
                                <div class="tweet-text">${p.text}</div>
                                <div class="tweet-actions">
                                    <span onclick="event.stopPropagation(); replyTo('${p.user}')">💬</span>
                                    <span class="${isReposted}" onclick="event.stopPropagation(); repostPost('${postId}')">🔄 ${repostsCount || ""}</span>
                                    <span class="${isLiked}" onclick="event.stopPropagation(); likePost('${postId}')">❤️ ${likesCount || ""}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
        };

        window.toggleTL = async (mode) => {
            currentTLMode = mode;
            document.getElementById('tab-tl-all').classList.toggle('active', mode === 'all');
            document.getElementById('tab-tl-follow').classList.toggle('active', mode === 'follow');
            
            const postsSnap = await get(query(ref(db, 'posts'), limitToLast(100)));
            const blackSnap = await get(ref(db, 'blacklist'));
            const blacklisted = blackSnap.exists() ? Object.keys(blackSnap.val()) : [];
            let following = [];
            if(mode === 'follow') {
                const followSnap = await get(ref(db, `users/${me}/following`));
                following = followSnap.exists() ? Object.keys(followSnap.val()) : [];
            }

            const area = document.getElementById('tl-area');
            area.innerHTML = "";
            if(postsSnap.exists()) {
                const allPosts = postsSnap.val();
                const displayList = [];

                Object.entries(allPosts).forEach(([postId, p]) => {
                    if(blacklisted.includes(p.user)) return;
                    // 通常投稿
                    if(mode === 'all' || (mode === 'follow' && (following.includes(p.user) || p.user === me))) {
                        displayList.push({ id: postId, data: p, sortTime: p.timestamp, by: null });
                    }
                    // リポスト投稿の抽出
                    if(p.reposts) {
                        Object.keys(p.reposts).forEach(reposter => {
                            if(blacklisted.includes(reposter)) return;
                            if(mode === 'all' || (mode === 'follow' && following.includes(reposter))) {
                                displayList.push({ id: postId, data: p, sortTime: p.timestamp, by: reposter }); // 本来はリポストした時間でソートすべきだが簡易化
                            }
                        });
                    }
                });

                displayList.sort((a, b) => b.sortTime - a.sortTime).slice(0, 100).forEach(item => {
                    area.innerHTML += renderTweetHTML(item.id, item.data, item.by);
                });
            }
        };

        const renderProfile = async (target) => {
            document.getElementById('app-container').style.display = 'none';
            document.getElementById('profile-view').style.display = 'block';
            
            const snap = await get(child(ref(db), `users/${target}`));
            const blacklisted = await isBlacklisted(target);

            if (blacklisted) {
                document.getElementById('view-normal-content').style.display = 'none';
                document.getElementById('view-banned-content').style.display = 'block';
                document.getElementById('banned-user-name').innerText = target;
                document.getElementById('profile-posts-area').innerHTML = "";
                return;
            }

            if (snap.exists()) {
                const d = snap.val();
                document.getElementById('view-normal-content').style.display = 'block';
                document.getElementById('view-banned-content').style.display = 'none';
                document.getElementById('view-name').innerText = target;
                document.getElementById('view-bio').innerText = d.bio || "";
                document.getElementById('view-score').innerText = d.score || 0;
                document.getElementById('view-followers').innerText = d.followers ? Object.keys(d.followers).length : 0;
                document.getElementById('view-icon').innerHTML = d.icon ? `<img src="${d.icon}">` : '👤';
                
                // フォローボタン
                const fBtn = document.getElementById('btn-follow');
                if(me && me !== target) {
                    fBtn.style.display = 'inline-block';
                    const fs = await get(ref(db, `users/${me}/following/${target}`));
                    fBtn.innerText = fs.exists() ? "フォロー解除" : "フォローする";
                    fBtn.style.background = fs.exists() ? "#eee" : "#1DA1F2";
                    fBtn.onclick = () => handleFollow(target);
                } else { fBtn.style.display = 'none'; }

                // プロフィール内投稿一覧
                const postsSnap = await get(query(ref(db, 'posts'), limitToLast(200)));
                const pArea = document.getElementById('profile-posts-area');
                pArea.innerHTML = "";
                if(postsSnap.exists()){
                    const posts = postsSnap.val();
                    const myList = [];
                    Object.entries(posts).forEach(([id, p]) => {
                        if(p.user === target) myList.push({ id, data: p, sortTime: p.timestamp, by: null });
                        if(p.reposts && p.reposts[target]) myList.push({ id, data: p, sortTime: p.timestamp, by: target });
                    });
                    myList.sort((a,b) => b.sortTime - a.sortTime).forEach(item => {
                        pArea.innerHTML += renderTweetHTML(item.id, item.data, item.by);
                    });
                }
            }
        };

        const handleFollow = async (target) => {
            const myF = ref(db, `users/${me}/following/${target}`);
            const tgF = ref(db, `users/${target}/followers/${me}`);
            const snap = await get(myF);
            if(snap.exists()) { await remove(myF); await remove(tgF); }
            else { await set(myF, true); await set(tgF, true); }
            renderProfile(target);
        };

        const loadUserList = async () => {
            const snap = await get(ref(db, 'users'));
            if(snap.exists()) {
                allUsersData = snap.val();
                renderUserList(document.getElementById('user-search').value, []);
            }
        };

        const renderUserList = (keyword, blacklist) => {
            const area = document.getElementById('user-list-area');
            area.innerHTML = "";
            Object.entries(allUsersData).forEach(([name, d]) => {
                if (keyword && !name.toLowerCase().includes(keyword.toLowerCase())) return;
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `<div class="user-icon">${d.icon ? `<img src="${d.icon}">` : '👤'}</div><div style="font-size:12px; font-weight:bold;">${name}</div>`;
                card.onclick = () => openProfile(name);
                area.appendChild(card);
            });
        };

        window.toggleRank = async (type) => {
            const snap = await get(ref(db, 'users'));
            const area = document.getElementById('rank-list-area');
            area.innerHTML = "";
            if(snap.exists()){
                const sorted = Object.entries(snap.val()).sort((a, b) => {
                    if(type === 'score') return (b[1].score || 0) - (a[1].score || 0);
                    const af = a[1].followers ? Object.keys(a[1].followers).length : 0;
                    const bf = b[1].followers ? Object.keys(b[1].followers).length : 0;
                    return bf - af;
                }).slice(0, 10);
                sorted.forEach(([name, d], i) => {
                    const val = type === 'score' ? (d.score || 0) + " pt" : (d.followers ? Object.keys(d.followers).length : 0) + " followers";
                    area.innerHTML += `<div class="rank-item" onclick="openProfile('${name}')"><div class="rank-num">${i+1}</div><div class="user-icon" style="width:45px;height:45px;margin:0;">${d.icon ? `<img src="${d.icon}">` : '👤'}</div><div class="rank-info"><b>${name}</b><br><small>${val}</small></div></div>`;
                });
            }
        };

        const init = async () => {
            const snap = await get(ref(db, 'users'));
            if(snap.exists()) allUsersData = snap.val();

            const hash = decodeURIComponent(window.location.hash.substring(1));
            if (hash) { renderProfile(hash); return; }
            if (me) {
                document.getElementById('app-container').style.display = 'flex';
                document.getElementById('disp-name').innerText = me;
                const mySnap = await get(child(ref(db), `users/${me}`));
                if(mySnap.exists()){
                    document.getElementById('home-score').innerText = mySnap.val().score || 0;
                    if(mySnap.val().icon) document.getElementById('side-icon').innerHTML = `<img src="${mySnap.val().icon}">`;
                }
                showSection('home');
            } else { document.getElementById('auth-container').style.display = 'block'; }
        };

        document.getElementById('btn-do-login').onclick = async () => {
            const id = document.getElementById('login-username').value.trim();
            const pw = document.getElementById('login-password').value.trim();
            const snap = await get(child(ref(db), `users/${id}`));
            if(snap.exists() && snap.val().password === pw) {
                localStorage.setItem("loginnow", id); location.reload();
            } else alert("間違い");
        };

        document.getElementById('btn-do-register').onclick = async () => {
            const id = document.getElementById('reg-username').value.trim();
            const pw = document.getElementById('reg-password').value.trim();
            const check = await get(child(ref(db), `users/${id}`));
            if(check.exists()) return alert("存在します");
            await set(ref(db, 'users/'+id), { password:pw, score:0, bio:"" });
            localStorage.setItem("loginnow", id); location.reload();
        };

        window.switchTab = (t) => {
            document.getElementById('form-login').classList.toggle('hidden', t!=='login');
            document.getElementById('form-register').classList.toggle('hidden', t!=='register');
        };
        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('btn-logout').onclick = () => { localStorage.removeItem("loginnow"); location.hash=""; location.reload(); };

        init();
    </script>
</body>
</html>
