<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザーポータル v13.0</title>
    <style>
        :root { --primary: #1d9bf0; --bg: #f7f9f9; --card: #ffffff; --text: #0f1419; --sub: #536471; --border: #eff3f4; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); margin: 0; color: var(--text); }
        
        /* Layout */
        #auth-container, #profile-view, #app-container { display: none; max-width: 600px; margin: 0 auto; background: var(--card); min-height: 100vh; position: relative; }
        #auth-container { margin-top: 50px; min-height: auto; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }

        /* Header & Nav */
        header { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); padding: 12px 16px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .hamburger-btn { font-size: 20px; cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.2s; }
        .hamburger-btn:hover { background: rgba(0,0,0,0.05); }

        /* Sidebar UI */
        #sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--card); box-shadow: 20px 0 40px rgba(0,0,0,0.05); transition: 0.3s; z-index: 1000; padding: 20px; }
        #sidebar.open { left: 0; }
        .nav-item { padding: 14px 16px; border-radius: 99px; cursor: pointer; font-size: 19px; margin-bottom: 4px; transition: 0.2s; display: flex; align-items: center; gap: 15px; }
        .nav-item:hover { background: var(--border); }

        /* Tweet UI */
        .tweet-card { display: flex; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .tweet-card:hover { background: rgba(0,0,0,0.02); }
        .user-icon { width: 48px; height: 48px; border-radius: 50%; background: #e1e8ed; overflow: hidden; flex-shrink: 0; }
        .user-icon img { width: 100%; height: 100%; object-fit: cover; }
        .tweet-content { margin-left: 12px; flex-grow: 1; }
        .tweet-header { display: flex; gap: 5px; font-size: 15px; }
        .tweet-user { font-weight: bold; }
        .tweet-text { font-size: 15px; line-height: 1.4; margin-top: 2px; white-space: pre-wrap; word-break: break-word; }
        .tweet-actions { display: flex; justify-content: space-between; max-width: 400px; margin-top: 10px; color: var(--sub); }
        .action-icon { display: flex; align-items: center; gap: 6px; font-size: 13px; transition: 0.2s; padding: 8px; border-radius: 50%; }
        .action-icon:hover { color: var(--primary); background: rgba(29, 155, 240, 0.1); }
        .liked { color: #f91880 !important; }
        .reposted { color: #00ba7c !important; }

        /* Profile UI */
        .profile-header { height: 150px; background: #cfd9de; }
        .profile-info { padding: 0 16px; margin-top: -40px; position: relative; border-bottom: 8px solid var(--bg); padding-bottom: 16px; }
        .profile-avatar { width: 80px; height: 80px; border: 4px solid var(--card); border-radius: 50%; background: #eee; }
        .profile-name { font-size: 20px; font-weight: 800; margin: 8px 0 2px; }
        .profile-bio { font-size: 15px; margin: 12px 0; color: var(--text); }
        .stats-box { display: flex; gap: 20px; font-size: 14px; color: var(--sub); }
        .stats-box b { color: var(--text); }

        /* Hype (Profile Only) */
        .hype-panel { background: #f7f9f9; margin: 16px; padding: 16px; border-radius: 16px; border: 1px solid var(--border); }
        .hype-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .hype-btn { border: 1px solid var(--primary); background: transparent; color: var(--primary); padding: 8px; border-radius: 99px; font-weight: bold; cursor: pointer; }
        .hype-btn:hover { background: rgba(29, 155, 240, 0.1); }

        /* Global Buttons */
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 99px; font-weight: bold; cursor: pointer; }
        .btn-main:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <div id="profile-view">
        <div class="profile-header"></div>
        <div class="profile-info">
            <div id="view-icon" class="user-icon profile-avatar">👤</div>
            <div style="text-align: right; margin-top: 10px;">
                <button id="btn-follow" class="btn-main"></button>
            </div>
            <div class="profile-name" id="view-name">---</div>
            <div id="view-bio" class="profile-bio"></div>
            <div class="stats-box">
                <span><b id="view-followers">0</b> フォロワー</span>
                <span><b id="view-score">0</b> pt</span>
            </div>

            <div id="tip-area" class="hype-panel">
                <div style="font-size: 13px; font-weight: bold;">🚀 ハイプを送って応援（手数料10%）</div>
                <div class="hype-grid">
                    <button class="hype-btn" onclick="sendTip(10)">10</button>
                    <button class="hype-btn" onclick="sendTip(100)">100</button>
                    <button class="hype-btn" onclick="sendTip(500)">500</button>
                    <button class="hype-btn" onclick="sendTip(1000)">1000</button>
                </div>
            </div>
            <div style="margin-top: 10px;"><a href="javascript:void(0)" onclick="closeProfile()" style="color:var(--primary); text-decoration:none; font-size:14px;">← 戻る</a></div>
        </div>
        <div id="profile-posts-area"></div>
    </div>

    <div id="auth-container">
        <div class="tab-menu"><div id="t-login" class="active" onclick="switchAuthTab('login')">ログイン</div><div id="t-reg" onclick="switchAuthTab('register')">新規登録</div></div>
        <div style="padding:30px;">
            <input type="text" id="auth-username" placeholder="ユーザー名" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
            <input type="password" id="auth-password" placeholder="パスワード" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px;">
            <button class="btn-main" style="width:100%" id="btn-auth-submit">実行</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <div class="hamburger-btn" onclick="toggleSidebar()">☰</div>
            <div style="margin-left:20px; font-weight:800; font-size:18px;" id="page-title">ホーム</div>
        </header>

        <nav id="sidebar">
            <div onclick="toggleSidebar()" style="cursor:pointer; font-size:24px;">×</div>
            <div class="user-icon" id="side-icon" style="margin:20px 0;">👤</div>
            <div id="disp-name" style="font-weight:bold; margin-bottom:20px;"></div>
            <div class="nav-item" onclick="showSection('home')">🏠 ホーム</div>
            <div class="nav-item" onclick="showSection('tl')">📱 タイムライン</div>
            <div class="nav-item" onclick="showSection('members')">👥 ユーザー</div>
            <div class="nav-item" onclick="showSection('ranking')">🏆 ランキング</div>
            <div class="nav-item" onclick="showSection('settings')">⚙️ 設定</div>
            <button id="btn-logout" style="width:100%; margin-top:30px; border:none; background:none; color:red; cursor:pointer;">ログアウト</button>
        </nav>

        <main id="section-home">
            <h2 id="welcome-msg">こんにちは！</h2>
            <div style="background:#fff; padding:20px; border-radius:16px; border:1px solid var(--border);">
                <div style="color:var(--sub); font-size:14px;">現在の所持ポイント</div>
                <div style="font-size:32px; font-weight:bold; color:var(--primary);" id="home-score">0</div>
            </div>
            <p style="font-size:12px; color:var(--sub); margin-top:20px;">あなたのURL: <code id="share-url"></code></p>
        </main>

        <main id="section-tl" class="hidden">
            <div style="padding:15px; border-bottom:1px solid var(--border);">
                <textarea id="post-input" placeholder="いまどうしてる？" style="width:100%; border:none; font-size:18px; outline:none; resize:none;" rows="3"></textarea>
                <div style="text-align:right;"><button onclick="submitPost()" class="btn-main">ポスト</button></div>
            </div>
            <div id="tl-area"></div>
        </main>

        <main id="section-members" class="hidden"><div id="user-list-area" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;"></div></main>
        <main id="section-ranking" class="hidden"><div id="rank-list-area"></div></main>
        <main id="section-settings" class="hidden">
            <input type="text" id="set-icon-url" placeholder="アイコン画像URL" style="width:100%; padding:10px; margin-bottom:10px;">
            <textarea id="set-bio" placeholder="自己紹介" style="width:100%; padding:10px; margin-bottom:10px;"></textarea>
            <button class="btn-main" onclick="saveSettings()">保存</button>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, increment, push, remove, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCwhHspaG94goiCIjVj3h-Un5pBK3JTjMU",
            authDomain: "soulkin-aa3b7.firebaseapp.com",
            databaseURL: "https://soulkin-aa3b7-default-rtdb.firebaseio.com",
            projectId: "soulkin-aa3b7",
            storageBucket: "soulkin-aa3b7.firebasestorage.app",
            messagingSenderId: "358331064206",
            appId: "1:358331064206:web:d7760ea0919259418a4edf"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let me = localStorage.getItem("loginnow");
        let allUsers = {};

        const linkify = (text) => text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--primary);text-decoration:none;">$1</a>');

        window.showSection = (name) => {
            ['home', 'tl', 'members', 'ranking', 'settings'].forEach(s => document.getElementById(`section-${s}`).classList.toggle('hidden', s !== name));
            document.getElementById('page-title').innerText = name.toUpperCase();
            document.getElementById('sidebar').classList.remove('open');
            if(name === 'tl') refreshTL();
            if(name === 'members') refreshMembers();
            if(name === 'ranking') refreshRanking();
            if(name === 'home') refreshHome();
        };

        const refreshHome = async () => {
            const snap = await get(ref(db, `users/${me}`));
            if(snap.exists()) document.getElementById('home-score').innerText = snap.val().score || 0;
        };

        window.submitPost = async () => {
            const txt = document.getElementById('post-input').value.trim();
            if(!txt) return;
            await push(ref(db, 'posts'), { user: me, text: txt, timestamp: serverTimestamp(), likes: {}, reposts: {} });
            document.getElementById('post-input').value = "";
            update(ref(db, `users/${me}`), { score: increment(10) });
            refreshTL();
        };

        window.refreshTL = async () => {
            const snap = await get(query(ref(db, 'posts'), limitToLast(50)));
            const area = document.getElementById('tl-area');
            area.innerHTML = "";
            if(snap.exists()){
                const posts = Object.entries(snap.val()).reverse();
                posts.forEach(([id, p]) => area.innerHTML += renderTweet(id, p));
            }
        };

        const renderTweet = (id, p) => {
            const u = allUsers[p.user] || {};
            const isLiked = p.likes && p.likes[me] ? "liked" : "";
            const isReposted = p.reposts && p.reposts[me] ? "reposted" : "";
            return `
                <div class="tweet-card" onclick="openProfile('${p.user}')">
                    <div class="user-icon">${u.icon ? `<img src="${u.icon}">` : '👤'}</div>
                    <div class="tweet-content">
                        <div class="tweet-header"><span class="tweet-user">${p.user}</span> <span style="color:var(--sub)">@${p.user}</span></div>
                        <div class="tweet-text">${linkify(p.text)}</div>
                        <div class="tweet-actions">
                            <span class="action-icon" onclick="event.stopPropagation(); alert('リプ機能は開発中です！')">💬</span>
                            <span class="action-icon ${isReposted}" onclick="event.stopPropagation(); toggleAction('${id}', 'reposts')">🔁 ${Object.keys(p.reposts||{}).length}</span>
                            <span class="action-icon ${isLiked}" onclick="event.stopPropagation(); toggleAction('${id}', 'likes')">❤️ ${Object.keys(p.likes||{}).length}</span>
                        </div>
                    </div>
                </div>`;
        };

        window.toggleAction = async (postId, type) => {
            const actionRef = ref(db, `posts/${postId}/${type}/${me}`);
            const snap = await get(actionRef);
            if(snap.exists()) await remove(actionRef);
            else await set(actionRef, true);
            refreshTL();
        };

        window.sendTip = async (amount) => {
            const target = decodeURIComponent(location.hash.substring(1));
            const mySnap = await get(ref(db, `users/${me}/score`));
            if((mySnap.val() || 0) < amount) return alert("pt不足");
            const tax = Math.floor(amount * 0.1);
            if(confirm(`${target}に ${amount}pt 送りますか？`)){
                await update(ref(db, `users/${me}`), { score: increment(-amount) });
                await update(ref(db, `users/${target}`), { score: increment(amount - tax) });
                alert("ハイプ完了！🚀");
                openProfile(target);
            }
        };

        window.openProfile = async (target) => {
            location.hash = target;
            document.getElementById('app-container').style.display = 'none';
            document.getElementById('profile-view').style.display = 'block';
            const snap = await get(ref(db, `users/${target}`));
            if(snap.exists()){
                const d = snap.val();
                document.getElementById('view-name').innerText = target;
                document.getElementById('view-bio').innerText = d.bio || "";
                document.getElementById('view-score').innerText = d.score || 0;
                document.getElementById('view-followers').innerText = d.followers ? Object.keys(d.followers).length : 0;
                document.getElementById('view-icon').innerHTML = d.icon ? `<img src="${d.icon}">` : '👤';
                
                const fBtn = document.getElementById('btn-follow');
                if(me === target) { fBtn.style.display = 'none'; document.getElementById('tip-area').style.display='none'; }
                else {
                    fBtn.style.display = 'inline-block';
                    document.getElementById('tip-area').style.display='block';
                    const isF = d.followers && d.followers[me];
                    fBtn.innerText = isF ? "解除" : "フォロー";
                    fBtn.onclick = () => toggleFollow(target, isF);
                }

                // プロフ投稿表示
                const postArea = document.getElementById('profile-posts-area');
                const pSnap = await get(query(ref(db, 'posts'), limitToLast(50)));
                postArea.innerHTML = "";
                if(pSnap.exists()){
                    Object.entries(pSnap.val()).reverse().filter(([id,p])=>p.user===target).forEach(([id,p])=>postArea.innerHTML += renderTweet(id,p));
                }
            }
        };

        const toggleFollow = async (target, isF) => {
            if(isF) { await remove(ref(db, `users/${me}/following/${target}`)); await remove(ref(db, `users/${target}/followers/${me}`)); }
            else { await set(ref(db, `users/${me}/following/${target}`), true); await set(ref(db, `users/${target}/followers/${me}`), true); }
            openProfile(target);
        };

        window.closeProfile = () => { location.hash = ""; document.getElementById('profile-view').style.display = 'none'; document.getElementById('app-container').style.display = 'block'; };

        // 共通初期化
        const init = async () => {
            const snap = await get(ref(db, 'users'));
            if(snap.exists()) allUsers = snap.val();
            if(me) {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('disp-name').innerText = me;
                document.getElementById('share-url').innerText = location.href.split('#')[0] + '#' + me;
                const h = decodeURIComponent(location.hash.substring(1));
                if(h) openProfile(h); else showSection('home');
            } else {
                document.getElementById('auth-container').style.display = 'block';
            }
        };

        // ログイン処理などは元のロジックを継承
        document.getElementById('btn-auth-submit').onclick = async () => {
            const u = document.getElementById('auth-username').value.trim();
            const p = document.getElementById('auth-password').value.trim();
            const snap = await get(ref(db, `users/${u}`));
            if(snap.exists() && snap.val().password === p){
                localStorage.setItem("loginnow", u);
                location.reload();
            } else if(!snap.exists()){
                await set(ref(db, `users/${u}`), { password: p, score: 500 });
                localStorage.setItem("loginnow", u);
                location.reload();
            } else alert("認証失敗");
        };

        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('btn-logout').onclick = () => { localStorage.clear(); location.reload(); };
        init();
    </script>
</body>
</html>
