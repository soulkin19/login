<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Original Minimal v18.0</title>
    <style>
        /* 初期のシンプルさを追求したスタイル */
        body { font-family: sans-serif; margin: 0; background: #fff; color: #000; }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; border-left: 1px solid #eee; border-right: 1px solid #eee; }
        
        header { border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff; z-index: 10; }
        .logo { font-weight: bold; font-size: 20px; text-decoration: none; color: #000; }

        /* 投稿エリア */
        .post-input-box { padding: 15px; border-bottom: 8px solid #f8f8f8; }
        textarea { width: 100%; border: 1px solid #eee; border-radius: 4px; padding: 10px; box-sizing: border-box; resize: none; font-size: 16px; outline: none; }
        .btn-post { background: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* ポストの見た目 */
        .post { padding: 15px; border-bottom: 1px solid #eee; display: flex; gap: 12px; cursor: pointer; }
        .icon { width: 48px; height: 48px; border-radius: 50%; background: #eee; flex-shrink: 0; object-fit: cover; }
        .post-body { flex: 1; }
        .user-info { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
        .rp-label { font-size: 12px; color: #00ba7c; margin-bottom: 5px; }
        .text { font-size: 15px; line-height: 1.4; word-break: break-all; }
        .text a { color: #1d9bf0; text-decoration: none; }
        
        /* アクション */
        .actions { display: flex; gap: 30px; margin-top: 12px; font-size: 13px; color: #555; }
        .act-btn { cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .active-rp { color: #00ba7c; font-weight: bold; }
        .active-like { color: #f91880; font-weight: bold; }

        /* プロフィール */
        .profile-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 100; overflow-y: auto; display: none; }
        .p-content { max-width: 500px; margin: 0 auto; }
        .p-top { padding: 20px 15px; border-bottom: 1px solid #eee; }
        .p-icon-big { width: 80px; height: 80px; border-radius: 50%; background: #eee; object-fit: cover; }
        .p-name { font-size: 20px; font-weight: 800; margin: 10px 0; }
        .p-bio { font-size: 14px; margin-bottom: 15px; }
        .p-stats { font-size: 14px; color: #555; margin-bottom: 15px; }

        .hype-btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .hype-btn { border: 1px solid #000; background: #fff; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-size: 12px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-box" class="app-container">
    <div style="padding: 100px 20px; text-align: center;">
        <h1 style="letter-spacing: -1px;">Portal</h1>
        <input type="text" id="u-name" placeholder="ユーザー名" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #eee;"><br>
        <input type="password" id="u-pass" placeholder="パスワード" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #eee;"><br>
        <button class="btn-post" id="login-btn" style="width: 100%; border-radius: 4px;">ログイン / 新規作成</button>
    </div>
</div>

<div id="main-app" class="app-container hidden">
    <header>
        <a href="javascript:void(0)" class="logo" onclick="location.reload()">Portal</a>
        <div>
            <span onclick="openProfile(me)" style="cursor:pointer; margin-right:15px;">👤</span>
            <span onclick="showSettings()" style="cursor:pointer;">⚙️</span>
        </div>
    </header>

    <div id="sec-settings" class="hidden" style="padding: 20px;">
        <h3>設定</h3>
        <p>アイコン変更:</p>
        <input type="file" id="icon-file" accept="image/*">
        <p>自己紹介:</p>
        <textarea id="set-bio" rows="2"></textarea>
        <button class="btn-post" onclick="saveSettings()">保存</button>
        <button onclick="logout()" style="margin-top:50px; display:block; color:red; border:none; background:none; cursor:pointer;">ログアウト</button>
    </div>

    <div id="sec-tl">
        <div class="post-input-box">
            <textarea id="post-input" placeholder="いまどうしてる？" rows="3"></textarea>
            <div style="text-align:right;"><button class="btn-post" onclick="submitPost()">ポスト</button></div>
        </div>
        <div id="tl-area"></div>
    </div>
</div>

<div id="profile-view" class="profile-view">
    <div class="p-content">
        <header>
            <span onclick="closeProfile()" style="cursor:pointer;">← 戻る</span>
            <b id="p-header-title">プロフィール</b>
        </header>
        <div class="p-top">
            <img id="p-icon" class="p-icon-big" src="">
            <div class="p-name" id="p-name">---</div>
            <div class="p-bio" id="p-bio">---</div>
            <div class="p-stats">
                <span id="p-score">0</span> pt
            </div>
            <div id="hype-area">
                <p style="font-size:12px; font-weight:bold;">ハイプを送る（投げ銭）</p>
                <div class="hype-btn-group">
                    <button class="hype-btn" onclick="sendTip(100)">100pt</button>
                    <button class="hype-btn" onclick="sendTip(500)">500pt</button>
                </div>
            </div>
        </div>
        <div id="p-posts"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, update, increment, push, remove, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCwhHspaG94goiCIjVj3h-Un5pBK3JTjMU",
        authDomain: "soulkin-aa3b7.firebaseapp.com",
        databaseURL: "https://soulkin-aa3b7-default-rtdb.firebaseio.com",
        projectId: "soulkin-aa3b7",
        storageBucket: "soulkin-aa3b7.firebasestorage.app",
        messagingSenderId: "358331064206",
        appId: "1:358331064206:web:d7760ea0919259418a4edf"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let me = localStorage.getItem("loginnow");
    let usersData = {};

    const linkify = (t) => t.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');

    window.submitPost = async () => {
        const val = document.getElementById('post-input').value.trim();
        if(!val) return;
        await push(ref(db, 'posts'), { user: me, text: val, time: serverTimestamp(), likes: {}, rps: {} });
        document.getElementById('post-input').value = "";
        update(ref(db, `users/${me}`), { score: increment(10) });
        refreshTL();
    };

    const drawPost = (id, p, isRp = false, rpUser = "") => {
        const u = usersData[p.user] || {};
        const isL = p.likes && p.likes[me];
        const isR = p.rps && p.rps[me];
        return `
            <div class="post" onclick="openProfile('${p.user}')">
                <img class="icon" src="${u.icon || 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='}">
                <div class="post-body">
                    ${isRp ? `<div class="rp-label">🔁 ${rpUser} がリポスト</div>` : ''}
                    <div class="user-info">${p.user}</div>
                    <div class="text">${linkify(p.text)}</div>
                    <div class="actions">
                        <div class="act-btn ${isL ? 'active-like' : ''}" onclick="event.stopPropagation(); toggleAct('${id}','likes')">❤️ ${p.likes ? Object.keys(p.likes).length : 0}</div>
                        <div class="act-btn ${isR ? 'active-rp' : ''}" onclick="event.stopPropagation(); toggleAct('${id}','rps')">🔁 ${p.rps ? Object.keys(p.rps).length : 0}</div>
                    </div>
                </div>
            </div>`;
    };

    window.refreshTL = async () => {
        const s = await get(query(ref(db, 'posts'), limitToLast(50)));
        const area = document.getElementById('tl-area');
        area.innerHTML = "";
        if(s.exists()) Object.entries(s.val()).reverse().forEach(([id, p]) => area.innerHTML += drawPost(id, p));
    };

    window.toggleAct = async (id, type) => {
        const r = ref(db, `posts/${id}/${type}/${me}`);
        const s = await get(r);
        if(s.exists()) await remove(r); else await set(r, true);
        refreshTL();
        if(document.getElementById('profile-view').style.display === 'block') openProfile(location.hash.substring(1));
    };

    window.saveSettings = async () => {
        const file = document.getElementById('icon-file').files[0];
        const bio = document.getElementById('set-bio').value;
        if(file) {
            const reader = new FileReader();
            reader.onloadend = async () => {
                await update(ref(db, `users/${me}`), { bio, icon: reader.result });
                alert("保存しました"); location.reload();
            };
            reader.readAsDataURL(file);
        } else {
            await update(ref(db, `users/${me}`), { bio });
            alert("保存しました"); location.reload();
        }
    };

    window.openProfile = async (u) => {
        location.hash = u;
        document.getElementById('profile-view').style.display = 'block';
        const s = await get(ref(db, `users/${u}`));
        if(s.exists()){
            const d = s.val();
            document.getElementById('p-name').innerText = u;
            document.getElementById('p-bio').innerText = d.bio || "";
            document.getElementById('p-score').innerText = Math.floor(d.score || 0);
            document.getElementById('p-icon').src = d.icon || "";
            document.getElementById('hype-area').classList.toggle('hidden', u === me);
            
            const pArea = document.getElementById('p-posts');
            const ps = await get(query(ref(db, 'posts'), limitToLast(100)));
            pArea.innerHTML = "";
            if(ps.exists()){
                Object.entries(ps.val()).reverse().forEach(([id, p]) => {
                    if(p.user === u) pArea.innerHTML += drawPost(id, p);
                    else if(p.rps && p.rps[u]) pArea.innerHTML += drawPost(id, p, true, u);
                });
            }
        }
    };

    window.sendTip = async (amt) => {
        const target = location.hash.substring(1);
        const s = await get(ref(db, `users/${me}/score`));
        if((s.val()||0) < amt) return alert("pt不足");
        await update(ref(db, `users/${me}`), { score: increment(-amt) });
        await update(ref(db, `users/${target}`), { score: increment(amt * 0.9) });
        openProfile(target);
    };

    window.showSettings = () => {
        const sec = document.getElementById('sec-settings');
        const tl = document.getElementById('sec-tl');
        sec.classList.toggle('hidden');
        tl.classList.toggle('hidden');
    };

    window.closeProfile = () => { document.getElementById('profile-view').style.display='none'; location.hash=""; };
    window.logout = () => { localStorage.clear(); location.reload(); };

    const init = async () => {
        const s = await get(ref(db, 'users'));
        if(s.exists()) usersData = s.val();
        if(me) {
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            const h = decodeURIComponent(location.hash.substring(1));
            if(h) openProfile(h); else refreshTL();
        }
    };

    document.getElementById('login-btn').onclick = async () => {
        const u = document.getElementById('u-name').value.trim();
        const p = document.getElementById('u-pass').value.trim();
        if(!u || !p) return;
        const s = await get(ref(db, `users/${u}`));
        if(s.exists() && s.val().password === p) { localStorage.setItem("loginnow", u); location.reload(); }
        else if(!s.exists()) { await set(ref(db, `users/${u}`), { password: p, score: 500 }); localStorage.setItem("loginnow", u); location.reload(); }
        else alert("Login Error");
    };

    init();
</script>
</body>
</html>
