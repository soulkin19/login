<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Portal v14.0</title>
    <style>
        :root { --main: #1d9bf0; --bg: #ffffff; --border: #eff3f4; --text: #0f1419; --sub: #536471; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); margin: 0; color: var(--text); }
        
        /* Layout */
        #auth-container, #profile-view, #app-container { display: none; max-width: 600px; margin: 0 auto; min-height: 100vh; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        .hidden { display: none !important; }

        /* Simple Header */
        header { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); padding: 0 16px; height: 53px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; font-weight: 800; font-size: 19px; }
        .back-btn { cursor: pointer; margin-right: 20px; font-size: 24px; }

        /* Minimal Sidebar (Bottom Nav for Mobile-like feel) */
        #sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { font-size: 24px; cursor: pointer; padding: 10px; }
        .sidebar-user { display: none; } /* PCなら表示させるけど一旦カット */

        /* Tweet UI */
        .tweet-card { display: flex; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .user-icon { width: 40px; height: 40px; border-radius: 50%; background: #eee; overflow: hidden; flex-shrink: 0; }
        .user-icon img { width: 100%; height: 100%; object-fit: cover; }
        .tweet-content { margin-left: 12px; flex-grow: 1; }
        .tweet-header { font-size: 15px; margin-bottom: 2px; }
        .tweet-user { font-weight: bold; }
        .tweet-handle { color: var(--sub); margin-left: 4px; }
        .tweet-text { font-size: 15px; line-height: 1.5; white-space: pre-wrap; }
        .tweet-actions { display: flex; justify-content: space-between; max-width: 350px; margin-top: 12px; color: var(--sub); font-size: 13px; }

        /* Profile - Clean & Modern */
        .profile-banner { height: 120px; background: #cfd9de; }
        .profile-meta { padding: 0 16px 16px; border-bottom: 1px solid var(--border); }
        .profile-avatar-wrap { display: flex; justify-content: space-between; align-items: flex-end; margin-top: -45px; margin-bottom: 12px; }
        .profile-avatar { width: 90px; height: 90px; border: 4px solid var(--bg); border-radius: 50%; background: #eee; }
        .btn-black { background: #0f1419; color: white; border: none; padding: 8px 16px; border-radius: 99px; font-weight: bold; cursor: pointer; }
        .profile-name { font-size: 20px; font-weight: 800; }
        .profile-handle { color: var(--sub); font-size: 15px; margin-bottom: 12px; }
        .profile-bio { font-size: 15px; line-height: 1.4; margin-bottom: 12px; }
        .stats { display: flex; gap: 20px; font-size: 14px; color: var(--sub); }
        .stats b { color: var(--text); }

        /* Hype Area (Profile only) */
        .hype-section { padding: 16px; background: #f7f9f9; margin: 16px; border-radius: 16px; }
        .hype-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .hype-btns button { border: 1px solid #ddd; background: #fff; padding: 8px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Post Area */
        .post-input-box { display: flex; padding: 16px; border-bottom: 1px solid var(--border); }
        .post-input-box textarea { flex-grow: 1; border: none; outline: none; font-size: 20px; resize: none; margin-left: 12px; }
        .btn-post { background: var(--main); color: white; border: none; padding: 8px 20px; border-radius: 99px; font-weight: bold; cursor: pointer; float: right; }

        /* Auth Card */
        .auth-card { padding: 40px 20px; text-align: center; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="auth-container" class="auth-card">
        <h1>X-Portal</h1>
        <div id="auth-form">
            <input type="text" id="auth-username" placeholder="ユーザー名">
            <input type="password" id="auth-password" placeholder="パスワード">
            <button class="btn-black" style="width:100%" id="btn-auth-submit">次へ</button>
        </div>
    </div>

    <div id="profile-view">
        <header><span class="back-btn" onclick="closeProfile()">←</span><span id="header-name">プロフィール</span></header>
        <div class="profile-banner"></div>
        <div class="profile-meta">
            <div class="profile-avatar-wrap">
                <div id="view-icon" class="user-icon profile-avatar">👤</div>
                <button id="btn-follow" class="btn-black"></button>
            </div>
            <div class="profile-name" id="view-name">---</div>
            <div class="profile-handle">@<span id="view-handle">---</span></div>
            <div id="view-bio" class="profile-bio"></div>
            <div class="stats">
                <span><b id="view-followers">0</b> フォロワー</span>
                <span><b id="view-score">0</b> pt</span>
            </div>
            <div id="tip-area" class="hype-section">
                <div style="font-size:14px; font-weight:bold;">🚀 ハイプを送る（投げ銭）</div>
                <div class="hype-btns">
                    <button onclick="sendTip(10)">10</button>
                    <button onclick="sendTip(100)">100</button>
                    <button onclick="sendTip(500)">500</button>
                    <button onclick="sendTip(1000)">1000</button>
                </div>
            </div>
        </div>
        <div id="profile-posts-area"></div>
    </div>

    <div id="app-container">
        <header><div id="page-title">ホーム</div></header>
        
        <main id="section-home">
            <div style="padding:20px;">
                <h2>おかえりなさい、<span id="disp-name"></span></h2>
                <div style="font-size:40px; font-weight:900;"><span id="home-score">0</span> <small style="font-size:15px; color:var(--sub)">ポイント</small></div>
                <p style="color:var(--sub); font-size:13px; margin-top:20px;">Share URL: <code id="share-url"></code></p>
            </div>
        </main>

        <main id="section-tl" class="hidden">
            <div class="post-input-box">
                <div class="user-icon" id="post-self-icon">👤</div>
                <div style="flex-grow:1;">
                    <textarea id="post-input" placeholder="いまどうしてる？" rows="2"></textarea>
                    <div style="border-top:1px solid var(--border); padding-top:10px;">
                        <button onclick="submitPost()" class="btn-post">ポストする</button>
                    </div>
                </div>
            </div>
            <div id="tl-area"></div>
        </main>

        <nav id="sidebar">
            <div class="nav-item" onclick="showSection('home')">🏠</div>
            <div class="nav-item" onclick="showSection('tl')">🔍</div>
            <div class="nav-item" onclick="showSection('settings')">⚙️</div>
            <div class="nav-item" id="my-profile-btn">👤</div>
        </nav>
        
        <main id="section-settings" class="hidden" style="padding:20px;">
            <h3>設定</h3>
            <button onclick="localStorage.clear(); location.reload();" style="color:red; background:none; border:1px solid red; padding:10px; border-radius:99px; width:100%;">ログアウト</button>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, increment, push, remove, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCwhHspaG94goiCIjVj3h-Un5pBK3JTjMU",
            authDomain: "soulkin-aa3b7.firebaseapp.com",
            databaseURL: "https://soulkin-aa3b7-default-rtdb.firebaseio.com",
            projectId: "soulkin-aa3b7",
            storageBucket: "soulkin-aa3b7.firebasestorage.app",
            messagingSenderId: "358331064206",
            appId: "1:358331064206:web:d7760ea0919259418a4edf"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let me = localStorage.getItem("loginnow");
        let allUsers = {};

        const linkify = (t) => t.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--main);text-decoration:none;">$1</a>');

        window.showSection = (n) => {
            ['home', 'tl', 'settings'].forEach(s => document.getElementById(`section-${s}`).classList.toggle('hidden', s !== n));
            document.getElementById('page-title').innerText = n === 'home' ? 'ホーム' : (n === 'tl' ? '話題を検索' : '設定');
            if(n === 'tl') refreshTL();
            if(n === 'home') refreshHome();
        };

        const refreshHome = async () => {
            const snap = await get(ref(db, `users/${me}`));
            if(snap.exists()) document.getElementById('home-score').innerText = snap.val().score || 0;
        };

        window.submitPost = async () => {
            const t = document.getElementById('post-input').value.trim();
            if(!t) return;
            await push(ref(db, 'posts'), { user: me, text: t, timestamp: serverTimestamp(), likes: {}, reposts: {} });
            document.getElementById('post-input').value = "";
            update(ref(db, `users/${me}`), { score: increment(10) });
            refreshTL();
        };

        window.refreshTL = async () => {
            const snap = await get(query(ref(db, 'posts'), limitToLast(50)));
            const area = document.getElementById('tl-area');
            area.innerHTML = "";
            if(snap.exists()){
                Object.entries(snap.val()).reverse().forEach(([id, p]) => area.innerHTML += renderTweet(id, p));
            }
        };

        const renderTweet = (id, p) => {
            const u = allUsers[p.user] || {};
            return `
                <div class="tweet-card" onclick="openProfile('${p.user}')">
                    <div class="user-icon">${u.icon ? `<img src="${u.icon}">` : '👤'}</div>
                    <div class="tweet-content">
                        <div class="tweet-header"><span class="tweet-user">${p.user}</span><span class="tweet-handle">@${p.user}</span></div>
                        <div class="tweet-text">${linkify(p.text)}</div>
                        <div class="tweet-actions">
                            <span>💬 0</span>
                            <span onclick="event.stopPropagation(); toggleAction('${id}', 'reposts')">🔁 ${Object.keys(p.reposts||{}).length}</span>
                            <span onclick="event.stopPropagation(); toggleAction('${id}', 'likes')">❤️ ${Object.keys(p.likes||{}).length}</span>
                        </div>
                    </div>
                </div>`;
        };

        window.toggleAction = async (postId, type) => {
            const actionRef = ref(db, `posts/${postId}/${type}/${me}`);
            const snap = await get(actionRef);
            if(snap.exists()) await remove(actionRef);
            else await set(actionRef, true);
            refreshTL();
        };

        window.sendTip = async (amount) => {
            const target = location.hash.substring(1);
            const mySnap = await get(ref(db, `users/${me}/score`));
            if((mySnap.val() || 0) < amount) return alert("pt不足");
            if(confirm(`${target}に ${amount}pt 送りますか？`)){
                await update(ref(db, `users/${me}`), { score: increment(-amount) });
                await update(ref(db, `users/${target}`), { score: increment(amount * 0.9) });
                alert("ハイプ完了！🚀");
                openProfile(target);
            }
        };

        window.openProfile = async (target) => {
            location.hash = target;
            document.getElementById('app-container').style.display = 'none';
            document.getElementById('profile-view').style.display = 'block';
            const snap = await get(ref(db, `users/${target}`));
            if(snap.exists()){
                const d = snap.val();
                document.getElementById('view-name').innerText = target;
                document.getElementById('view-handle').innerText = target;
                document.getElementById('view-bio').innerText = d.bio || "";
                document.getElementById('view-score').innerText = Math.floor(d.score || 0);
                document.getElementById('view-followers').innerText = d.followers ? Object.keys(d.followers).length : 0;
                document.getElementById('view-icon').innerHTML = d.icon ? `<img src="${d.icon}">` : '👤';
                
                const fBtn = document.getElementById('btn-follow');
                if(me === target) { fBtn.style.display = 'none'; document.getElementById('tip-area').style.display='none'; }
                else {
                    fBtn.style.display = 'block';
                    document.getElementById('tip-area').style.display='block';
                    const isF = d.followers && d.followers[me];
                    fBtn.innerText = isF ? "フォロー解除" : "フォロー";
                    fBtn.onclick = () => toggleFollow(target, isF);
                }

                const postArea = document.getElementById('profile-posts-area');
                const pSnap = await get(query(ref(db, 'posts'), limitToLast(50)));
                postArea.innerHTML = "";
                if(pSnap.exists()){
                    Object.entries(pSnap.val()).reverse().filter(([id,p])=>p.user===target).forEach(([id,p])=>postArea.innerHTML += renderTweet(id,p));
                }
            }
        };

        const toggleFollow = async (target, isF) => {
            if(isF) { await remove(ref(db, `users/${me}/following/${target}`)); await remove(ref(db, `users/${target}/followers/${me}`)); }
            else { await set(ref(db, `users/${me}/following/${target}`), true); await set(ref(db, `users/${target}/followers/${me}`), true); }
            openProfile(target);
        };

        window.closeProfile = () => { location.hash = ""; document.getElementById('profile-view').style.display = 'none'; document.getElementById('app-container').style.display = 'block'; };

        const init = async () => {
            const snap = await get(ref(db, 'users'));
            if(snap.exists()) allUsers = snap.val();
            if(me) {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('disp-name').innerText = me;
                document.getElementById('share-url').innerText = location.href.split('#')[0] + '#' + me;
                document.getElementById('my-profile-btn').onclick = () => openProfile(me);
                const h = decodeURIComponent(location.hash.substring(1));
                if(h) openProfile(h); else showSection('home');
            } else {
                document.getElementById('auth-container').style.display = 'block';
            }
        };

        document.getElementById('btn-auth-submit').onclick = async () => {
            const u = document.getElementById('auth-username').value.trim();
            const p = document.getElementById('auth-password').value.trim();
            if(!u || !p) return;
            const snap = await get(ref(db, `users/${u}`));
            if(snap.exists() && snap.val().password === p){
                localStorage.setItem("loginnow", u);
                location.reload();
            } else if(!snap.exists()){
                await set(ref(db, `users/${u}`), { password: p, score: 500 });
                localStorage.setItem("loginnow", u);
                location.reload();
            } else alert("認証失敗");
        };

        init();
    </script>
</body>
</html>
