<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Portal v15.0</title>
    <style>
        :root { --blue: #1d9bf0; --bg: #ffffff; --border: #f0f0f0; --text: #1a1a1a; --sub: #666666; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.4; }
        
        /* Layout */
        #app-container, #profile-view, #auth-container { max-width: 550px; margin: 0 auto; min-height: 100vh; }
        .hidden { display: none !important; }

        /* Header Navigation */
        nav.top-nav { display: flex; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); z-index: 10; }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--sub); }
        .nav-item.active { color: var(--blue); border-bottom: 2px solid var(--blue); }

        /* Post Input */
        .input-section { padding: 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #eee; flex-shrink: 0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .input-area { flex-grow: 1; }
        textarea { width: 100%; border: none; outline: none; font-size: 18px; resize: none; font-family: inherit; }
        .post-footer { display: flex; justify-content: flex-end; padding-top: 10px; }
        .btn { background: var(--blue); color: #fff; border: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* Timeline */
        .post-card { padding: 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; cursor: pointer; }
        .post-main { flex-grow: 1; }
        .user-name { font-weight: bold; margin-right: 5px; }
        .post-text { margin-top: 4px; font-size: 15px; word-break: break-all; }
        .post-text a { color: var(--blue); text-decoration: none; }
        .post-actions { display: flex; gap: 24px; margin-top: 12px; color: var(--sub); font-size: 13px; }

        /* Profile - Ultra Simple */
        .profile-wrap { padding: 20px 16px; border-bottom: 1px solid var(--border); }
        .profile-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .big-avatar { width: 70px; height: 70px; border-radius: 50%; background: #eee; overflow: hidden; }
        .p-name { font-size: 22px; font-weight: 800; margin: 10px 0 2px; }
        .p-handle { color: var(--sub); font-size: 14px; }
        .p-bio { margin: 15px 0; font-size: 15px; }
        .p-stats { display: flex; gap: 15px; font-size: 14px; }
        .p-stats b { color: var(--text); }
        
        /* Hype Area */
        .hype-box { background: #f8f8f8; padding: 15px; border-radius: 12px; margin-top: 20px; text-align: center; }
        .hype-btns { display: flex; justify-content: space-between; gap: 8px; margin-top: 10px; }
        .hype-btns button { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-weight: bold; cursor: pointer; }

        /* Auth */
        .auth-box { padding: 50px 20px; text-align: center; }
        .auth-box input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="auth-container" class="auth-box">
        <h2 style="font-weight: 900; font-size: 32px;">X-Portal</h2>
        <input type="text" id="auth-u" placeholder="Username">
        <input type="password" id="auth-p" placeholder="Password">
        <button class="btn" style="width: 100%; padding: 12px;" id="auth-btn">ログイン / 登録</button>
    </div>

    <div id="app-container" class="hidden">
        <nav class="top-nav">
            <div class="nav-item active" onclick="switchTab('tl', this)">タイムライン</div>
            <div class="nav-item" onclick="switchTab('ranking', this)">ランキング</div>
            <div class="nav-item" onclick="switchTab('settings', this)">設定</div>
            <div class="nav-item" id="nav-me">プロフ</div>
        </nav>

        <main id="section-tl">
            <div class="input-section">
                <div class="avatar" id="my-avatar-mini">👤</div>
                <div class="input-area">
                    <textarea id="post-input" placeholder="いまどうしてる？" rows="2"></textarea>
                    <div class="post-footer"><button class="btn" onclick="submitPost()">ポスト</button></div>
                </div>
            </div>
            <div id="tl-area"></div>
        </main>

        <main id="section-ranking" class="hidden" style="padding:16px;"></main>
        <main id="section-settings" class="hidden" style="padding:20px; text-align:center;">
            <p>ポイント: <b id="set-score">0</b> pt</p>
            <button class="btn" onclick="logout()" style="background:#ff4444;">ログアウト</button>
        </main>
    </div>

    <div id="profile-view" class="hidden">
        <div style="padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center;">
            <span style="cursor: pointer; font-size: 20px; margin-right: 20px;" onclick="closeProfile()">←</span>
            <b id="head-name">プロフィール</b>
        </div>
        <div class="profile-wrap">
            <div class="profile-top">
                <div id="p-icon" class="big-avatar">👤</div>
                <button id="p-follow-btn" class="btn" style="background:#000;"></button>
            </div>
            <div class="p-name" id="p-name">---</div>
            <div class="p-handle">@<span id="p-handle">---</span></div>
            <div class="p-bio" id="p-bio"></div>
            <div class="p-stats">
                <span><b id="p-followers">0</b> フォロワー</span>
                <span><b id="p-points">0</b> pt</span>
            </div>
            <div id="p-hype-area" class="hype-box">
                <div style="font-size:12px; color:var(--sub); font-weight:bold;">🚀 ポイントを送って応援</div>
                <div class="hype-btns">
                    <button onclick="sendTip(10)">10</button>
                    <button onclick="sendTip(100)">100</button>
                    <button onclick="sendTip(500)">500</button>
                </div>
            </div>
        </div>
        <div id="p-posts"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, increment, push, remove, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCwhHspaG94goiCIjVj3h-Un5pBK3JTjMU",
            authDomain: "soulkin-aa3b7.firebaseapp.com",
            databaseURL: "https://soulkin-aa3b7-default-rtdb.firebaseio.com",
            projectId: "soulkin-aa3b7",
            storageBucket: "soulkin-aa3b7.firebasestorage.app",
            messagingSenderId: "358331064206",
            appId: "1:358331064206:web:d7760ea0919259418a4edf"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let me = localStorage.getItem("loginnow");
        let usersData = {};

        const linkify = (t) => t.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');

        window.switchTab = (target, el) => {
            ['tl', 'ranking', 'settings'].forEach(s => document.getElementById(`section-${s}`).classList.toggle('hidden', s !== target));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(target === 'tl') refreshTL();
            if(target === 'ranking') refreshRanking();
            if(target === 'settings') refreshSettings();
        };

        window.submitPost = async () => {
            const val = document.getElementById('post-input').value.trim();
            if(!val) return;
            await push(ref(db, 'posts'), { user: me, text: val, time: serverTimestamp(), likes: {} });
            document.getElementById('post-input').value = "";
            update(ref(db, `users/${me}`), { score: increment(10) });
            refreshTL();
        };

        const renderPost = (id, p) => {
            const u = usersData[p.user] || {};
            return `
                <div class="post-card" onclick="openProfile('${p.user}')">
                    <div class="avatar">${u.icon ? `<img src="${u.icon}">` : '👤'}</div>
                    <div class="post-main">
                        <div><span class="user-name">${p.user}</span><span style="color:#666; font-size:14px;">@${p.user}</span></div>
                        <div class="post-text">${linkify(p.text)}</div>
                        <div class="post-actions">
                            <span onclick="event.stopPropagation(); toggleLike('${id}')">❤️ ${p.likes ? Object.keys(p.likes).length : 0}</span>
                            <span>🔁 0</span>
                        </div>
                    </div>
                </div>`;
        };

        window.refreshTL = async () => {
            const snap = await get(query(ref(db, 'posts'), limitToLast(50)));
            const area = document.getElementById('tl-area');
            area.innerHTML = "";
            if(snap.exists()) Object.entries(snap.val()).reverse().forEach(([id, p]) => area.innerHTML += renderPost(id, p));
        };

        window.toggleLike = async (postId) => {
            const lRef = ref(db, `posts/${postId}/likes/${me}`);
            const s = await get(lRef);
            if(s.exists()) await remove(lRef); else await set(lRef, true);
            refreshTL();
        };

        window.openProfile = async (u) => {
            location.hash = u;
            document.getElementById('app-container').classList.add('hidden');
            document.getElementById('profile-view').classList.remove('hidden');
            const s = await get(ref(db, `users/${u}`));
            if(s.exists()){
                const d = s.val();
                document.getElementById('p-name').innerText = u;
                document.getElementById('p-handle').innerText = u;
                document.getElementById('p-bio').innerText = d.bio || "No bio.";
                document.getElementById('p-points').innerText = Math.floor(d.score || 0);
                document.getElementById('p-followers').innerText = d.followers ? Object.keys(d.followers).length : 0;
                document.getElementById('p-icon').innerHTML = d.icon ? `<img src="${d.icon}">` : '👤';
                
                const btn = document.getElementById('p-follow-btn');
                if(u === me) { btn.style.display = 'none'; document.getElementById('p-hype-area').classList.add('hidden'); }
                else {
                    btn.style.display = 'block'; document.getElementById('p-hype-area').classList.remove('hidden');
                    const isF = d.followers && d.followers[me];
                    btn.innerText = isF ? "解除" : "フォロー";
                    btn.onclick = () => toggleFollow(u, isF);
                }
                const pArea = document.getElementById('p-posts');
                const pSnap = await get(query(ref(db, 'posts'), limitToLast(100)));
                pArea.innerHTML = "";
                if(pSnap.exists()) Object.entries(pSnap.val()).reverse().filter(([i,p])=>p.user===u).forEach(([i,p])=>pArea.innerHTML += renderPost(i,p));
            }
        };

        window.sendTip = async (amt) => {
            const target = location.hash.substring(1);
            const myS = await get(ref(db, `users/${me}/score`));
            if((myS.val()||0) < amt) return alert("Point不足");
            if(confirm(`${amt}pt送りますか？`)){
                await update(ref(db, `users/${me}`), { score: increment(-amt) });
                await update(ref(db, `users/${target}`), { score: increment(amt * 0.9) });
                openProfile(target);
            }
        };

        window.toggleFollow = async (t, isF) => {
            if(isF) { await remove(ref(db, `users/${me}/following/${t}`)); await remove(ref(db, `users/${t}/followers/${me}`)); }
            else { await set(ref(db, `users/${me}/following/${t}`), true); await set(ref(db, `users/${t}/followers/${me}`), true); }
            openProfile(t);
        };

        window.closeProfile = () => { location.hash = ""; document.getElementById('profile-view').classList.add('hidden'); document.getElementById('app-container').classList.remove('hidden'); };
        window.logout = () => { localStorage.clear(); location.reload(); };

        const init = async () => {
            const s = await get(ref(db, 'users'));
            if(s.exists()) usersData = s.val();
            if(me) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('nav-me').onclick = () => openProfile(me);
                const h = decodeURIComponent(location.hash.substring(1));
                if(h) openProfile(h); else refreshTL();
            }
        };

        document.getElementById('auth-btn').onclick = async () => {
            const u = document.getElementById('auth-u').value.trim();
            const p = document.getElementById('auth-p').value.trim();
            if(!u || !p) return;
            const s = await get(ref(db, `users/${u}`));
            if(s.exists() && s.val().password === p) { localStorage.setItem("loginnow", u); location.reload(); }
            else if(!s.exists()) { await set(ref(db, `users/${u}`), { password: p, score: 500 }); localStorage.setItem("loginnow", u); location.reload(); }
            else alert("Error");
        };

        init();
    </script>
</body>
</html>
